name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

# Cancel superseded runs on the same ref so a fast follow-up push does not
# keep an outdated run going.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lockfile guard — rejects PRs that change package-lock.json without also
  # changing package.json. Prevents the `devOptional` ↔ `dev` drift cycle
  # caused by running `npm install` locally (macOS) after pulling a CI-written
  # lockfile (Linux). Day-to-day installs should use `npm ci`, which never
  # mutates the lockfile.
  # ---------------------------------------------------------------------------
  lockfile-guard:
    name: Lockfile guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Reject lockfile-only changes
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base" "$head")
          lock_changed=$(echo "$changed" | grep -Fx 'package-lock.json' || true)
          pkg_changed=$(echo "$changed" | grep -Fx 'package.json' || true)
          if [ -n "$lock_changed" ] && [ -z "$pkg_changed" ]; then
            echo "::error::package-lock.json changed without package.json changing."
            echo "This usually means 'npm install' was run locally and re-normalized the lockfile."
            echo "Use 'npm ci' for day-to-day installs. Only regen the lockfile when actually changing deps — run tools/scripts/relock.sh."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Lightweight sync / docs checks. No Nx, no affected — these always run.
  # ---------------------------------------------------------------------------
  checks:
    name: Sync checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: corepack enable
      - run: npm ci
      - run: node tools/scripts/check-sync.js
      - run: node tools/scripts/sync-spec.mjs --check
      - run: node tools/scripts/check-docs-sync.js
      - run: node tools/scripts/gen-llms-txt.mjs --check

  # ---------------------------------------------------------------------------
  # Lint — fastest gate, fails early if style/type rules break.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: nrwl/nx-set-shas@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: corepack enable
      - run: npm ci
      - name: Lint affected (PR)
        if: github.event_name == 'pull_request'
        run: npx nx affected -t lint --parallel=4
      - name: Lint all (push to main)
        if: github.event_name != 'pull_request'
        run: npx nx run-many -t lint --parallel=4

  # ---------------------------------------------------------------------------
  # Test — unit tests on all projects that define a `test` target.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: nrwl/nx-set-shas@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: corepack enable
      - run: npm ci
      - name: Test affected (PR)
        if: github.event_name == 'pull_request'
        run: npx nx affected -t test --parallel=2
      - name: Test all (push to main)
        if: github.event_name != 'pull_request'
        run: npx nx run-many -t test --parallel=2

  # ---------------------------------------------------------------------------
  # Build — library packaging + docs site. Validates that every project still
  # compiles cleanly under production settings.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: nrwl/nx-set-shas@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: corepack enable
      - run: npm ci
      - name: Build affected (PR)
        if: github.event_name == 'pull_request'
        run: npx nx affected -t build --parallel=2
      - name: Build all (push to main)
        if: github.event_name != 'pull_request'
        run: npx nx run-many -t build --parallel=2
      # ---------------------------------------------------------------------
      # Skill packaging — validates that every Claude Code skill in skills/
      # still produces a clean zip. The `lint` target above already validates
      # SKILL.md frontmatter and reference-link integrity; this step catches
      # zip-pipeline regressions (missing files, broken `tools/scripts/
      # package-skill.mjs`, etc.).
      # ---------------------------------------------------------------------
      - name: Package skills (affected on PR)
        if: github.event_name == 'pull_request'
        run: npx nx affected -t package --parallel=2
      - name: Package skills (all on push to main)
        if: github.event_name != 'pull_request'
        run: npx nx run-many -t package --parallel=2

  # ---------------------------------------------------------------------------
  # CLI e2e — spins up local verdaccio, publishes the preset + CLI tarballs,
  # scaffolds a workspace per framework and builds it. Slow (~5 min) so it is
  # only gated when create-workspace or create-atelier-ui-workspace is affected.
  # ---------------------------------------------------------------------------
  cli-e2e:
    name: CLI e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: nrwl/nx-set-shas@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: corepack enable
      - run: npm ci
      # Always use `affected` — e2e is slow (~5 min per framework) so skipping
      # unrelated commits matters even on main. `--output-style=stream` disables
      # Nx's terminal collation so the child-process output lands in the CI log
      # live; without it a hung e2e produces a completely empty log until the
      # job timeout fires.
      - run: npx nx affected -t e2e --parallel=1 --output-style=stream
