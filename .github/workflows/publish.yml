name: Publish

on:
  push:
    branches:
      - main
    paths:
      - 'libs/**'
      - 'skills/**'
      - 'package.json'
      - 'package-lock.json'
      - 'nx.json'
      - 'tsconfig.base.json'
      - '.github/workflows/publish.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: 'release = version + changelog + publish (normal). publish-only = publish the current tagged versions without a bump (recovery, e.g. after a failed publish left a tag unpublished).'
        type: choice
        options:
          - release
          - publish-only
        default: release

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: corepack enable

      - run: npm ci

      - name: Configure git identity for nx release
        # nx release commits version bumps + changelog entries before publishing.
        # The runner has no git user configured by default, which fails the
        # commit step on the first conventional-commit-triggered bump.
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Release and Publish
        # `nx release --yes` skips publishing when there is no version bump, so a
        # tag left unpublished by an earlier failed run can't be republished that
        # way. `publish-only` runs the explicit publish subcommand to push the
        # current tagged versions regardless of bump.
        run: |
          if [ "${{ github.event.inputs.mode }}" = "publish-only" ]; then
            npx nx release publish
          else
            npx nx release --yes
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public
