[build]
  command = "npx nx run docs:prerender && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/react/.storybook --output-dir dist/docs/storybook-react && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/angular/.storybook --output-dir dist/docs/storybook-angular && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/vue/.storybook --output-dir dist/docs/storybook-vue"
  publish = "dist/docs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Storybook — let Netlify serve their static files directly
[[redirects]]
  from = "/storybook-react"
  to = "/storybook-react/"
  status = 301

[[redirects]]
  from = "/storybook-angular"
  to = "/storybook-angular/"
  status = 301

[[redirects]]
  from = "/storybook-vue"
  to = "/storybook-vue/"
  status = 301

# Docs SPA fallback — must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
