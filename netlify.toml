[build]
  command = "npx nx run docs:build && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/react/.storybook --output-dir dist/docs/storybook-react && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/angular/.storybook --output-dir dist/docs/storybook-angular && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/vue/.storybook --output-dir dist/docs/storybook-vue"
  publish = "dist/docs"

# RFC 8288 Link headers for agent discovery
[[headers]]
  for = "/"
  [headers.values]
    Link = '''</llms.txt>; rel="describedby", </llms-full.txt>; rel="service-doc"'''

# Markdown for Agents — serve text/markdown when Accept: text/markdown is requested
[[edge_functions]]
  path = "/*"
  function = "markdown-negotiation"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# MCP endpoints — must come before Storybook redirects
[[redirects]]
  from = "/storybook-react/mcp"
  to = "/.netlify/functions/storybook-react-mcp"
  status = 200

[[redirects]]
  from = "/storybook-angular/mcp"
  to = "/.netlify/functions/storybook-angular-mcp"
  status = 200

[[redirects]]
  from = "/storybook-vue/mcp"
  to = "/.netlify/functions/storybook-vue-mcp"
  status = 200

# Storybook — let Netlify serve their static files directly
[[redirects]]
  from = "/storybook-react"
  to = "/storybook-react/"
  status = 301

[[redirects]]
  from = "/storybook-angular"
  to = "/storybook-angular/"
  status = 301

[[redirects]]
  from = "/storybook-vue"
  to = "/storybook-vue/"
  status = 301
