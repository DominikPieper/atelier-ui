[build]
  command = "npx nx run docs:prerender && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/react/.storybook --output-dir dist/docs/storybook-react && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/angular/.storybook --output-dir dist/docs/storybook-angular"
  publish = "dist/docs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Storybook — let Netlify serve their static files directly
[[redirects]]
  from = "/storybook-react"
  to = "/storybook-react/"
  status = 301

[[redirects]]
  from = "/storybook-angular"
  to = "/storybook-angular/"
  status = 301

# Storybook MCP endpoints
[[redirects]]
  from = "/mcp/storybook-react"
  to = "/.netlify/functions/storybook-react-mcp"
  status = 200

[[redirects]]
  from = "/mcp/storybook-angular"
  to = "/.netlify/functions/storybook-angular-mcp"
  status = 200

# Docs SPA fallback — must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
