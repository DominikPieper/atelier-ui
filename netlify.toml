[build]
  command = "npx nx run docs:prerender && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/llm-components-react/.storybook --output-dir dist/docs/storybook-react && BUILD_STORYBOOK=1 npx storybook build --config-dir libs/llm-components-angular/.storybook --output-dir dist/docs/storybook-angular"
  publish = "dist/docs"

# Storybook — let Netlify serve their static files directly
[[redirects]]
  from = "/storybook-react"
  to = "/storybook-react/"
  status = 301

[[redirects]]
  from = "/storybook-angular"
  to = "/storybook-angular/"
  status = 301

# Docs SPA fallback — must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
