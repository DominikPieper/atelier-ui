<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--ui-color-surface); font-family: var(--ui-font-family); color: var(--ui-color-text); display:flex; align-items:center; gap:24px; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .lockup img { height: 48px; width: auto; display: block; }
  .stack { display: flex; flex-direction: column; gap: 2px; line-height: 1; }
  .word { font-size: 22px; font-weight: 800; letter-spacing: -.04em; text-transform: uppercase; color: #006470; }
  .attr { font-size: 9.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #475569; }
  .right { margin-left: auto; display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .ver { font-family: var(--ui-font-mono); font-size: 11px; padding: 2px 8px; background: rgba(0,100,112,.1); border-radius: 8px; color: #006470; font-weight: 600; }
  .tag { font-size: 11px; color: #475569; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/logo.png" alt="Atelier mark">
    <div class="stack">
      <span class="word">Atelier</span>
      <span class="attr">By Dominik Pieper</span>
    </div>
  </div>
  <div class="right">
    <span class="ver">v0 · Workshop</span>
    <span class="tag">Pen + brush + A — capital A in slate, brush stroke in brand teal.</span>
  </div>
</body>
</html>
