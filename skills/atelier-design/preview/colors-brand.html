<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Brand (Conciso)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--ui-color-surface); font-family: var(--ui-font-family); color: var(--ui-color-text); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border-radius: 10px; overflow: hidden; border: 1px solid var(--ui-color-border); }
  .chip { height: 44px; }
  .meta { padding: 6px 10px; }
  .name { font-size: 11px; font-weight: 600; }
  .hex  { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); }
  .label { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="label">Brand palette · opt-in for diagrams (Conciso reference)</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#00bebe"></div><div class="meta"><div class="name">corporate</div><div class="hex">#00bebe</div></div></div>
    <div class="sw"><div class="chip" style="background:#00d296"></div><div class="meta"><div class="name">agile</div><div class="hex">#00d296</div></div></div>
    <div class="sw"><div class="chip" style="background:#009696"></div><div class="meta"><div class="name">architecture</div><div class="hex">#009696</div></div></div>
    <div class="sw"><div class="chip" style="background:#00b4ff"></div><div class="meta"><div class="name">development</div><div class="hex">#00b4ff</div></div></div>
    <div class="sw"><div class="chip" style="background:#005064"></div><div class="meta"><div class="name">petrol</div><div class="hex">#005064</div></div></div>
    <div class="sw"><div class="chip" style="background:#b5e61c"></div><div class="meta"><div class="name">ai</div><div class="hex">#b5e61c</div></div></div>
    <div class="sw"><div class="chip" style="background:#00ebff"></div><div class="meta"><div class="name">light-blue</div><div class="hex">#00ebff</div></div></div>
    <div class="sw"><div class="chip" style="background:#a0fa50"></div><div class="meta"><div class="name">light-green</div><div class="hex">#a0fa50</div></div></div>
  </div>
</body>
</html>
