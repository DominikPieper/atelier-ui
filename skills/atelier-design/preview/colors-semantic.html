<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--ui-color-surface); font-family: var(--ui-font-family); color: var(--ui-color-text); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .pair { border-radius: 10px; overflow: hidden; border: 1px solid var(--ui-color-border); }
  .chip { padding: 10px 12px; font-size: 12px; font-weight: 600; font-family: var(--ui-font-mono); }
  .meta { padding: 7px 10px; background: var(--ui-color-surface); }
  .name { font-size: 11px; font-weight: 600; }
  .hex  { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); }
  .label { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="label">Semantic — bg + text pairs (AA verified)</div>
  <div class="grid">
    <div class="pair"><div class="chip" style="background:#dcfce7;color:#166534">success</div><div class="meta"><div class="name">success</div><div class="hex">#dcfce7 · #166534</div></div></div>
    <div class="pair"><div class="chip" style="background:#fef3c7;color:#854d0e">warning</div><div class="meta"><div class="name">warning</div><div class="hex">#fef3c7 · #854d0e</div></div></div>
    <div class="pair"><div class="chip" style="background:#fee2e2;color:#991b1b">danger</div><div class="meta"><div class="name">danger</div><div class="hex">#fee2e2 · #991b1b</div></div></div>
    <div class="pair"><div class="chip" style="background:#e0f2fe;color:#0c4a6e">info</div><div class="meta"><div class="name">info</div><div class="hex">#e0f2fe · #0c4a6e</div></div></div>
  </div>
</body>
</html>
