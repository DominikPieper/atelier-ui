<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--ui-color-surface); font-family: var(--ui-font-family); color: var(--ui-color-text); }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  button { font-family: inherit; font-weight: 600; font-size: 14px; cursor: pointer; border-radius: 10px; padding: 10px 18px; border: none; transition: all .15s; display:inline-flex; align-items:center; gap:6px; }
  .b-primary { background: #006470; color: #fff; }
  .b-primary:hover { background: #004e58; box-shadow: 0 0 20px rgba(0,100,112,.3); transform: translateY(-1px); }
  .b-outline { background: transparent; color: #0f172a; border: 1.5px solid #e2e8f0; }
  .b-outline:hover { border-color: #006470; color: #006470; background: rgba(0,100,112,.08); }
  .b-secondary { background: #f1f5f9; color: #0f172a; }
  .b-danger { background: #b91c1c; color: #fff; }
  .b-sm { padding: 6px 12px; font-size: 12px; }
  .b-lg { padding: 12px 22px; font-size: 15px; }
  .b-disabled { opacity: .5; cursor: not-allowed; }
  .label { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="label">Variants</div>
  <div class="row">
    <button class="b-primary">Primary</button>
    <button class="b-secondary">Secondary</button>
    <button class="b-outline">Outline</button>
    <button class="b-danger">Danger</button>
  </div>
  <div class="label">Sizes · disabled</div>
  <div class="row">
    <button class="b-primary b-sm">sm</button>
    <button class="b-primary">md</button>
    <button class="b-primary b-lg">lg</button>
    <button class="b-primary b-disabled">Disabled</button>
  </div>
</body>
</html>
