<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Code block</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--ui-color-surface); font-family: var(--ui-font-family); color: var(--ui-color-text); }
  .block { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
  .head { display: flex; justify-content: space-between; align-items: center; padding: 7px 12px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; }
  .lang { font-family: var(--ui-font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #006470; }
  .copy { padding: 2px 9px; font-size: 11px; font-weight: 600; background: transparent; border: 1px solid #e2e8f0; border-radius: 6px; color: #475569; cursor: pointer; }
  pre { margin: 0; padding: 14px 16px; font-family: var(--ui-font-mono); font-size: 12.5px; line-height: 1.7; overflow: auto; }
  .key { color: #0c4a6e; }
  .nm  { color: #006470; }
  .str { color: #166534; }
  .mut { color: #475569; }
</style>
</head>
<body>
  <div class="block">
    <div class="head"><span class="lang">JSON</span><button class="copy">Copy</button></div>
<pre>{
  <span class="nm">"mcpServers"</span>: {
    <span class="nm">"storybook-react"</span>: {
      <span class="nm">"type"</span>: <span class="str">"http"</span>,
      <span class="nm">"url"</span>: <span class="str">"https://atelier.pieper.io/storybook-react/mcp"</span>
    }
  }
}</pre>
  </div>
</body>
</html>
