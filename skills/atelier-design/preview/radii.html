<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--ui-color-surface); font-family: var(--ui-font-family); color: var(--ui-color-text); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 86px; height: 64px; background: var(--ui-color-primary-light); border: 1px solid var(--ui-color-primary); }
  .name { font-family: var(--ui-font-mono); font-size: 11px; color: var(--ui-color-text); }
  .px   { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); }
  .label { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="label">Radii — modernised scale</div>
  <div class="row">
    <div class="sw"><div class="box" style="border-radius:8px"></div><div class="name">sm</div><div class="px">8px</div></div>
    <div class="sw"><div class="box" style="border-radius:10px"></div><div class="name">md</div><div class="px">10px</div></div>
    <div class="sw"><div class="box" style="border-radius:14px"></div><div class="name">lg</div><div class="px">14px</div></div>
    <div class="sw"><div class="box" style="border-radius:20px"></div><div class="name">xl</div><div class="px">20px</div></div>
    <div class="sw"><div class="box" style="border-radius:9999px"></div><div class="name">full</div><div class="px">∞</div></div>
  </div>
</body>
</html>
