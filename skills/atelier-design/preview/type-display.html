<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Display & Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--ui-color-surface); font-family: var(--ui-font-family); color: var(--ui-color-text); }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 8px; }
  .label { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); text-transform: uppercase; letter-spacing: .08em; min-width: 92px; }
  .specimen { line-height: 1.05; }
  .meta { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); margin-left: auto; }
</style>
</head>
<body>
  <div class="row"><span class="label">Display</span><span class="specimen" style="font-size:48px;font-weight:900;letter-spacing:-.04em">Atelier</span><span class="meta">Inter 900 · -0.04em</span></div>
  <div class="row"><span class="label">H1</span><span class="specimen" style="font-size:34px;font-weight:800;letter-spacing:-.04em">Design in Figma.</span><span class="meta">44/1.1 · 800</span></div>
  <div class="row"><span class="label">H2</span><span class="specimen" style="font-size:24px;font-weight:800;letter-spacing:-.03em">The three pillars</span><span class="meta">32/1.2 · 800</span></div>
  <div class="row"><span class="label">H3</span><span class="specimen" style="font-size:18px;font-weight:700;letter-spacing:-.02em">Composition over configuration</span><span class="meta">20/1.3 · 700</span></div>
</body>
</html>
